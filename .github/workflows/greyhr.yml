name: GreyHR Automation

on:
  workflow_dispatch:

  schedule:
    - cron: "30 3 * * 1-5" # 09:00 IST Mon-Fri
    - cron: "30 15 * * 1-5" # 21:00 IST Mon-Fri

permissions:
  contents: read

concurrency:
  group: greyhr-bot
  cancel-in-progress: false

jobs:
  run-bot:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Show IST Time
        run: |
          echo "UTC: $(date -u)"
          echo "IST: $(TZ='Asia/Kolkata' date)"

      - name: Run GreyHR Bot
        run: node src/actions/run.js
        env:
          TZ: Asia/Kolkata
          GREYHR_URL: ${{ secrets.GREYHR_URL }}
          GREYHR_USERNAME: ${{ secrets.GREYHR_USERNAME }}
          GREYHR_PASSWORD: ${{ secrets.GREYHR_PASSWORD }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}

      - name: Upload Screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots-${{ github.run_number }}
          path: "*.png"
          retention-days: 7
