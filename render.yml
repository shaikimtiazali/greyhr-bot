services:
  - type: worker
    name: greyhr-bot
    runtime: node
    plan: free
    buildCommand: npm ci && PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/.playwright-browsers npx playwright install chromium
    startCommand: npm start
    envVars:
      - key: TZ
        value: UTC
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/.playwright-browsers
      - key: GREYHR_URL
        sync: false
      - key: GREYHR_USERNAME
        sync: false
      - key: GREYHR_PASSWORD
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_TO
        sync: false
